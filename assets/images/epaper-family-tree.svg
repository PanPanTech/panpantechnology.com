<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-label="Family tree of e-paper display technologies grouped into electrophoretic, liquid-crystal and other reflective routes">
  <rect width="760" height="430" fill="#f5f6f8"/>
  <text x="30" y="30" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9aa3b5" letter-spacing="2">E-PAPER IS A FAMILY, NOT A SINGLE TECHNOLOGY</text>

  <!-- root -->
  <rect x="300" y="52" width="160" height="40" rx="8" fill="#0b0f1a"/>
  <text x="380" y="77" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="15" font-weight="600" fill="#fff">E-Paper (reflective,</text>
  <text x="380" y="86" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="9" fill="#8fa3c8"> </text>

  <!-- connectors to 3 groups -->
  <g stroke="#9aa3b5" stroke-width="1.4" fill="none">
    <path d="M380 92 L380 108 L150 108 L150 128"/>
    <path d="M380 108 L400 108 L400 128"/>
    <path d="M380 108 L640 108 L640 128"/>
  </g>

  <!-- group A: electrophoretic -->
  <rect x="60" y="128" width="180" height="34" rx="6" fill="#dbe6f7" stroke="#0e5fd9" stroke-width="1.3"/>
  <text x="150" y="150" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="600" fill="#0e5fd9">Electrophoretic (EPD)</text>
  <g font-family="Instrument Sans, sans-serif" font-size="11.5" fill="#3d4453">
    <rect x="70" y="176" width="160" height="26" rx="4" fill="#fff" stroke="#e2e6ed"/><text x="80" y="193">E-Ink microcapsule ★</text>
    <rect x="70" y="208" width="160" height="26" rx="4" fill="#fff" stroke="#e2e6ed"/><text x="80" y="225">SiPix microcup</text>
    <rect x="70" y="240" width="160" height="26" rx="4" fill="#fff" stroke="#e2e6ed"/><text x="80" y="257">Bridgestone QR-LPD</text>
  </g>
  <text x="70" y="288" font-family="IBM Plex Mono, monospace" font-size="10" fill="#0e5fd9">"墨水屏" — the one</text>
  <text x="70" y="302" font-family="IBM Plex Mono, monospace" font-size="10" fill="#0e5fd9">everyone means</text>

  <!-- group B: liquid crystal -->
  <rect x="310" y="128" width="180" height="34" rx="6" fill="#e6f0e6" stroke="#2f6b3f" stroke-width="1.3"/>
  <text x="400" y="150" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="600" fill="#2f6b3f">Liquid crystal</text>
  <g font-family="Instrument Sans, sans-serif" font-size="11.5" fill="#3d4453">
    <rect x="320" y="176" width="160" height="40" rx="4" fill="#fff" stroke="#e2e6ed"/><text x="330" y="193">Cholesteric (ChLCD) ★</text><text x="330" y="209" font-size="10" fill="#6a7386">full colour, wide temp</text>
    <rect x="320" y="222" width="160" height="40" rx="4" fill="#fff" stroke="#e2e6ed"/><text x="330" y="239">Ultra-stable LCD ★</text><text x="330" y="255" font-size="10" fill="#6a7386">pressure-proof, multi-stable</text>
  </g>
  <text x="320" y="288" font-family="IBM Plex Mono, monospace" font-size="10" fill="#2f6b3f">survives high heat</text>

  <!-- group C: other -->
  <rect x="560" y="128" width="160" height="34" rx="6" fill="#f0eee6" stroke="#8a7a3a" stroke-width="1.3"/>
  <text x="640" y="150" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="600" fill="#8a7a3a">Other reflective</text>
  <g font-family="Instrument Sans, sans-serif" font-size="11.5" fill="#3d4453">
    <rect x="570" y="176" width="140" height="26" rx="4" fill="#fff" stroke="#e2e6ed"/><text x="580" y="193">MEMS (Mirasol)</text>
    <rect x="570" y="208" width="140" height="26" rx="4" fill="#fff" stroke="#e2e6ed"/><text x="580" y="225">Electrowetting</text>
  </g>
  <text x="570" y="256" font-family="IBM Plex Mono, monospace" font-size="10" fill="#8a7a3a">mostly discontinued</text>

  <line x1="30" y1="336" x2="730" y2="336" stroke="#d8dde6" stroke-width="1"/>
  <text x="30" y="360" font-family="Instrument Sans, sans-serif" font-size="12.5" fill="#3d4453">All share three traits: reflective (no backlight), bistable (image holds with power off), and paper-like.</text>
  <text x="30" y="380" font-family="Instrument Sans, sans-serif" font-size="12.5" fill="#3d4453">They differ enormously in colour, operating temperature, pressure tolerance and cost. ★ = covered in depth below.</text>
  <text x="30" y="404" font-family="IBM Plex Mono, monospace" font-size="9.5" fill="#9aa3b5">PanPanTech, 2026.</text>
</svg>
