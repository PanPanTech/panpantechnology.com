<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" role="img" aria-label="Warehouse zone map showing where floor soil is generated and how cleaning robot routes separate from forklift lanes">
  <rect width="760" height="440" fill="#f5f6f8"/>
  <text x="30" y="30" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9aa3b5" letter-spacing="2">WHERE THE DIRT COMES FROM — AND WHO CLEANS IT WHEN</text>

  <!-- building outline -->
  <rect x="40" y="55" width="530" height="300" fill="#ffffff" stroke="#0b0f1a" stroke-width="1.5"/>

  <!-- inbound dock -->
  <rect x="40" y="55" width="120" height="300" fill="#fdf0e8" stroke="#c25b2e" stroke-width="1.2"/>
  <text x="100" y="78" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="600" fill="#c25b2e">DOCK</text>
  <text x="100" y="96" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="10.5" fill="#6a7386">Outdoor debris</text>
  <text x="100" y="111" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="10.5" fill="#6a7386">tracked in on tyres</text>
  <text x="100" y="133" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9.5" fill="#c25b2e">HIGHEST SOIL LOAD</text>
  <g stroke="#c25b2e" stroke-width="1" stroke-dasharray="3 3">
    <line x1="52" y1="150" x2="148" y2="150"/>
  </g>
  <text x="100" y="172" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="10.5" fill="#3d4453">Clean here most</text>
  <text x="100" y="187" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="10.5" fill="#3d4453">often — it seeds</text>
  <text x="100" y="202" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="10.5" fill="#3d4453">the whole building</text>

  <!-- racking aisles -->
  <g>
    <rect x="180" y="75" width="330" height="26" fill="#e2e6ed"/>
    <rect x="180" y="131" width="330" height="26" fill="#e2e6ed"/>
    <rect x="180" y="187" width="330" height="26" fill="#e2e6ed"/>
    <rect x="180" y="243" width="330" height="26" fill="#e2e6ed"/>
    <rect x="180" y="299" width="330" height="26" fill="#e2e6ed"/>
  </g>
  <text x="345" y="92" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9.5" fill="#6a7386">RACKING</text>
  <text x="345" y="148" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9.5" fill="#6a7386">RACKING</text>
  <text x="345" y="204" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9.5" fill="#6a7386">RACKING</text>
  <text x="345" y="260" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9.5" fill="#6a7386">RACKING</text>
  <text x="345" y="316" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9.5" fill="#6a7386">RACKING</text>

  <!-- robot cleaning route in aisles -->
  <g stroke="#0e5fd9" stroke-width="2.2" fill="none" stroke-linecap="round">
    <path d="M195 114 L495 114"/>
    <path d="M195 170 L495 170"/>
    <path d="M195 226 L495 226"/>
    <path d="M195 282 L495 282"/>
  </g>

  <!-- forklift lane -->
  <rect x="520" y="75" width="42" height="250" fill="#fdf0e8" stroke="#c25b2e" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="541" y="205" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#c25b2e" transform="rotate(-90 541 205)">FORKLIFT LANE</text>

  <!-- packing area -->
  <rect x="180" y="331" width="330" height="20" fill="#e6f0e6" stroke="#2f6b3f" stroke-width="1"/>
  <text x="345" y="345" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="10.5" fill="#2f6b3f">Packing line — cardboard dust, strapping, film</text>

  <!-- legend -->
  <g>
    <line x1="600" y1="80" x2="630" y2="80" stroke="#0e5fd9" stroke-width="2.2"/>
    <text x="638" y="84" font-family="Instrument Sans, sans-serif" font-size="11" fill="#3d4453">Robot route</text>

    <rect x="600" y="102" width="30" height="12" fill="#fdf0e8" stroke="#c25b2e" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="638" y="112" font-family="Instrument Sans, sans-serif" font-size="11" fill="#3d4453">Forklift lane</text>

    <rect x="600" y="126" width="30" height="12" fill="#e2e6ed"/>
    <text x="638" y="136" font-family="Instrument Sans, sans-serif" font-size="11" fill="#3d4453">Racking</text>
  </g>

  <g>
    <text x="600" y="176" font-family="Space Grotesk, sans-serif" font-size="12.5" font-weight="600" fill="#0b0f1a">Separate by TIME,</text>
    <text x="600" y="194" font-family="Space Grotesk, sans-serif" font-size="12.5" font-weight="600" fill="#0b0f1a">not just by space</text>
    <text x="600" y="216" font-family="Instrument Sans, sans-serif" font-size="11" fill="#6a7386">Robots clean aisles</text>
    <text x="600" y="231" font-family="Instrument Sans, sans-serif" font-size="11" fill="#6a7386">between picking waves</text>
    <text x="600" y="246" font-family="Instrument Sans, sans-serif" font-size="11" fill="#6a7386">or on the night shift.</text>
    <text x="600" y="268" font-family="Instrument Sans, sans-serif" font-size="11" fill="#6a7386">The forklift lane is</text>
    <text x="600" y="283" font-family="Instrument Sans, sans-serif" font-size="11" fill="#6a7386">cleaned only when</text>
    <text x="600" y="298" font-family="Instrument Sans, sans-serif" font-size="11" fill="#6a7386">traffic is stopped.</text>
  </g>

  <line x1="40" y1="380" x2="720" y2="380" stroke="#d8dde6" stroke-width="1"/>
  <text x="40" y="402" font-family="Instrument Sans, sans-serif" font-size="12" fill="#3d4453">Soil is generated at the dock and the packing line, then carried everywhere else on tyres and shoes.</text>
  <text x="40" y="420" font-family="Instrument Sans, sans-serif" font-size="12" fill="#3d4453">Cleaning those two zones more often does more for the whole floor than adding coverage in the aisles.</text>
  <text x="40" y="436" font-family="IBM Plex Mono, monospace" font-size="9.5" fill="#9aa3b5">Schematic — layout illustrative. PanPanTech, 2026.</text>
</svg>
