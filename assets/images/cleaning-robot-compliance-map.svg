<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-label="Map of which compliance document families apply to a commercial cleaning robot by subsystem and destination market">
  <rect width="760" height="430" fill="#f5f6f8"/>
  <text x="30" y="30" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9aa3b5" letter-spacing="2">ONE ROBOT — FOUR SEPARATE DOCUMENT FAMILIES</text>

  <!-- the robot box -->
  <rect x="40" y="70" width="150" height="290" rx="8" fill="#ffffff" stroke="#0b0f1a" stroke-width="1.5"/>
  <text x="115" y="95" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600" fill="#0b0f1a">The robot</text>
  <g font-family="Instrument Sans, sans-serif" font-size="11.5" fill="#3d4453">
    <rect x="56" y="112" width="118" height="34" rx="4" fill="#f5f6f8" stroke="#e2e6ed"/>
    <text x="115" y="133" text-anchor="middle">Machine &amp; motion</text>
    <rect x="56" y="156" width="118" height="34" rx="4" fill="#f5f6f8" stroke="#e2e6ed"/>
    <text x="115" y="177" text-anchor="middle">Electrical &amp; charger</text>
    <rect x="56" y="200" width="118" height="34" rx="4" fill="#f5f6f8" stroke="#e2e6ed"/>
    <text x="115" y="221" text-anchor="middle">Radio module</text>
    <rect x="56" y="244" width="118" height="34" rx="4" fill="#f5f6f8" stroke="#e2e6ed"/>
    <text x="115" y="265" text-anchor="middle">Battery pack</text>
    <rect x="56" y="288" width="118" height="34" rx="4" fill="#f5f6f8" stroke="#e2e6ed"/>
    <text x="115" y="309" text-anchor="middle">Materials &amp; waste</text>
  </g>

  <!-- connectors -->
  <g stroke="#0e5fd9" stroke-width="1.2" fill="none">
    <path d="M190 129 L245 129"/><path d="M190 173 L245 173"/><path d="M190 217 L245 217"/><path d="M190 261 L245 261"/><path d="M190 305 L245 305"/>
  </g>

  <!-- EU column -->
  <text x="255" y="90" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="600" fill="#0b0f1a">European Union</text>
  <g font-family="IBM Plex Mono, monospace" font-size="10.5" fill="#0e5fd9">
    <text x="255" y="133">Machinery Reg. 2023/1230</text>
    <text x="255" y="177">LVD 2014/35 · IEC 60335-2-72</text>
    <text x="255" y="221">RED 2014/53/EU</text>
    <text x="255" y="265">IEC 62133-2 · UN 38.3</text>
    <text x="255" y="309">RoHS · REACH · WEEE</text>
  </g>

  <!-- US column -->
  <text x="520" y="90" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="600" fill="#0b0f1a">United States</text>
  <g font-family="IBM Plex Mono, monospace" font-size="10.5" fill="#2f6b3f">
    <text x="520" y="133">ANSI/A3 R15.08 (if AMR)</text>
    <text x="520" y="177">NRTL listing (UL/ETL)</text>
    <text x="520" y="221">FCC Part 15</text>
    <text x="520" y="265">UN 38.3 · DOT/IATA</text>
    <text x="520" y="309">State-level e-waste rules</text>
  </g>

  <!-- product-specific callout -->
  <rect x="255" y="336" width="460" height="52" rx="6" fill="#ffffff" stroke="#0e5fd9" stroke-width="1.4"/>
  <text x="268" y="357" font-family="Space Grotesk, sans-serif" font-size="12.5" font-weight="600" fill="#0b0f1a">Across both: IEC 63327 — automatic floor treatment machines for commercial use</text>
  <text x="268" y="376" font-family="Instrument Sans, sans-serif" font-size="11.5" fill="#3d4453">Applied in addition to IEC 60335-2-72. This is the standard written for autonomous cleaning machines.</text>

  <text x="40" y="412" font-family="Instrument Sans, sans-serif" font-size="11.5" fill="#6a7386">A single "CE certificate" cannot cover all five rows. Ask which document covers which subsystem.</text>
  <text x="40" y="426" font-family="IBM Plex Mono, monospace" font-size="9.5" fill="#9aa3b5">Indicative map — confirm the applicable list per model and destination. PanPanTech, 2026.</text>
</svg>
