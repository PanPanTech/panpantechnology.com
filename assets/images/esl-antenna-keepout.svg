<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" role="img" aria-label="PCB trace antenna keep-out area and how the enclosure and metal shelf rail detune it">
  <rect width="760" height="400" fill="#f5f6f8"/>
  <text x="30" y="30" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9aa3b5" letter-spacing="2">PCB TRACE ANTENNA — KEEP-OUT AND DETUNING</text>

  <!-- board -->
  <rect x="60" y="70" width="380" height="240" rx="8" fill="#e6f0e6" stroke="#2f6b3f" stroke-width="1.5"/>
  <text x="70" y="92" font-family="IBM Plex Mono, monospace" font-size="10" fill="#2f6b3f">PCBA</text>

  <!-- keep-out zone -->
  <rect x="80" y="105" width="150" height="90" rx="4" fill="#ffffff" stroke="#0e5fd9" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="88" y="122" font-family="IBM Plex Mono, monospace" font-size="10" fill="#0e5fd9">KEEP-OUT — NO COPPER</text>

  <!-- inverted-F antenna trace -->
  <path d="M95 175 L95 145 L205 145 L205 160" fill="none" stroke="#0b0f1a" stroke-width="3"/>
  <path d="M120 175 L120 145" fill="none" stroke="#0b0f1a" stroke-width="3"/>
  <circle cx="95" cy="178" r="3.5" fill="#c25b2e"/>
  <text x="103" y="192" font-family="Instrument Sans, sans-serif" font-size="10.5" fill="#3d4453">feed point</text>

  <!-- ground plane -->
  <rect x="80" y="205" width="340" height="90" rx="4" fill="#cfe0cf" stroke="#2f6b3f" stroke-width="1"/>
  <text x="90" y="225" font-family="Instrument Sans, sans-serif" font-size="11" fill="#2f6b3f">Ground plane — must NOT extend under the antenna</text>

  <!-- components -->
  <rect x="255" y="110" width="60" height="40" fill="#0b0f1a" opacity="0.85"/>
  <text x="285" y="134" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#ffffff">SoC</text>
  <circle cx="370" cy="140" r="22" fill="#e2e6ed" stroke="#0b0f1a" stroke-width="1.2"/>
  <text x="370" y="144" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9" fill="#0b0f1a">CELL</text>

  <!-- enclosure influence -->
  <g>
    <path d="M470 90 L700 90 L700 200 L470 200 Z" fill="none" stroke="#0b0f1a" stroke-width="1.4"/>
    <text x="480" y="112" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="600" fill="#0b0f1a">Enclosure shifts resonance</text>
    <text x="480" y="134" font-family="Instrument Sans, sans-serif" font-size="11.5" fill="#3d4453">Plastic has a dielectric constant &gt; air.</text>
    <text x="480" y="152" font-family="Instrument Sans, sans-serif" font-size="11.5" fill="#3d4453">Closing the case pulls the resonant</text>
    <text x="480" y="170" font-family="Instrument Sans, sans-serif" font-size="11.5" fill="#3d4453">frequency DOWN — so the antenna must</text>
    <text x="480" y="188" font-family="Instrument Sans, sans-serif" font-size="11.5" fill="#3d4453">be tuned assembled, never bare.</text>
  </g>

  <g>
    <path d="M470 220 L700 220 L700 310 L470 310 Z" fill="none" stroke="#c25b2e" stroke-width="1.4"/>
    <text x="480" y="242" font-family="Space Grotesk, sans-serif" font-size="13" font-weight="600" fill="#c25b2e">Metal rail detunes it again</text>
    <text x="480" y="264" font-family="Instrument Sans, sans-serif" font-size="11.5" fill="#3d4453">A steel shelf rail millimetres behind the</text>
    <text x="480" y="282" font-family="Instrument Sans, sans-serif" font-size="11.5" fill="#3d4453">label couples to the antenna and cuts</text>
    <text x="480" y="300" font-family="Instrument Sans, sans-serif" font-size="11.5" fill="#3d4453">radiated efficiency. Validate on real rails.</text>
  </g>

  <line x1="60" y1="335" x2="700" y2="335" stroke="#d8dde6" stroke-width="1"/>
  <text x="60" y="358" font-family="Instrument Sans, sans-serif" font-size="12" fill="#3d4453">Measure with a vector network analyser (return loss / VSWR), not an oscilloscope.</text>
  <text x="60" y="377" font-family="Instrument Sans, sans-serif" font-size="12" fill="#3d4453">An oscilloscope belongs on rails, ripple and timing — it cannot tell you if an antenna is matched.</text>
  <text x="60" y="394" font-family="IBM Plex Mono, monospace" font-size="9.5" fill="#9aa3b5">Schematic — not to scale. PanPanTech, 2026.</text>
</svg>
