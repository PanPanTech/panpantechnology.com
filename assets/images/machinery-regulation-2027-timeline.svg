<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-label="Timeline showing the EU Machinery Directive to Machinery Regulation cutover on 20 January 2027 with no transitional period">
  <rect width="760" height="300" fill="#f5f6f8"/>
  <text x="30" y="30" font-family="IBM Plex Mono, monospace" font-size="11" fill="#9aa3b5" letter-spacing="2">EU MACHINERY RULES — HARD CUTOVER, NO OVERLAP</text>

  <!-- timeline base -->
  <line x1="60" y1="150" x2="700" y2="150" stroke="#d8dde6" stroke-width="2"/>

  <!-- directive period -->
  <rect x="60" y="120" width="330" height="30" fill="#dbe6f7" stroke="#0e5fd9" stroke-width="1.2"/>
  <text x="225" y="140" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="12.5" font-weight="600" fill="#0b0f1a">Machinery Directive 2006/42/EC</text>
  <text x="225" y="176" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="11" fill="#6a7386">Place on market under the Directive</text>
  <text x="225" y="192" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="11" fill="#6a7386">until 19 January 2027</text>

  <!-- regulation period -->
  <rect x="392" y="120" width="308" height="30" fill="#e6f0e6" stroke="#2f6b3f" stroke-width="1.2"/>
  <text x="546" y="140" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="12.5" font-weight="600" fill="#0b0f1a">Machinery Regulation (EU) 2023/1230</text>
  <text x="546" y="176" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="11" fill="#6a7386">Applies directly in all Member States</text>
  <text x="546" y="192" text-anchor="middle" font-family="Instrument Sans, sans-serif" font-size="11" fill="#6a7386">from 20 January 2027</text>

  <!-- cutover marker -->
  <line x1="391" y1="88" x2="391" y2="215" stroke="#c25b2e" stroke-width="2"/>
  <circle cx="391" cy="150" r="6" fill="#c25b2e"/>
  <text x="391" y="80" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="600" fill="#c25b2e">20 Jan 2027</text>
  <text x="391" y="232" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10.5" fill="#c25b2e">NO TRANSITIONAL PERIOD</text>

  <!-- entry into force marker -->
  <line x1="60" y1="150" x2="60" y2="108" stroke="#9aa3b5" stroke-width="1"/>
  <text x="60" y="100" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9.5" fill="#9aa3b5">19 Jul 2023</text>
  <text x="60" y="88" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="9.5" fill="#9aa3b5">in force</text>

  <line x1="60" y1="256" x2="700" y2="256" stroke="#d8dde6" stroke-width="1"/>
  <text x="60" y="276" font-family="Instrument Sans, sans-serif" font-size="12" fill="#3d4453">What this means for a buyer: a robot certified only to the old Directive cannot be placed on the EU market after the cutover.</text>
  <text x="60" y="294" font-family="Instrument Sans, sans-serif" font-size="12" fill="#3d4453">Ask your supplier now which regime their file is built to — retrofitting a technical file takes months, not weeks.</text>
</svg>
